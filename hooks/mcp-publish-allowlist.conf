# MCP Publish Allowlist
# One tool-name regex per line. Lines starting with # and blank lines are ignored.
# These tools are allowed through the guard-mcp-publish hook without user confirmation.

# Google Workspace doc/sheet operations for Product Roadmap project
^mcp__google-workspace__(create_doc|modify_doc_text|create_spreadsheet|create_sheet|modify_sheet_values|insert_doc_elements|batch_update_doc|format_sheet_range)$

# Chrome browser automation (Claude in Chrome extension)
^mcp__chrome-browser__
^mcp__claude-in-chrome__
